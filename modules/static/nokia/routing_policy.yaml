community-set:
  - name: GRACEFUL_SHUTDOWN
    member: ["65535:0"]
  - name: AVOIDED_PATH
    member: ["14907:0"]
  - name: BACKUP_PATH
    member: ["14907:1"]
  - name: SELECTED_PATH
    member: ["14907:11"]

policy:
  - name: ALL
    default-action:
      policy-result: accept

  - name: NONE
    default-action:
      policy-result: reject

  - name: evpn_external4_out
    default-action:
      policy-result: reject
    statement:
      - name: loopback4
        match:
          prefix:
            prefix-set: overlay_loopback4
        action:
          policy-result: accept
      - name: no_host_routes4
        match:
          prefix:
            prefix-set: no_host_routes4
          bgp:
            as-path-length:
              value: 0
        action:
          policy-result: reject
      - name: overlay_routes
        action:
          policy-result: accept

  - name: evpn_external6_out
    default-action:
      policy-result: reject
    statement:
      - name: loopback6
        match:
          prefix:
            prefix-set: overlay_loopback6
        action:
          policy-result: accept
      - name: no_host_routes6
        match:
          prefix:
            prefix-set: no_host_routes6
          bgp:
            as-path-length:
              value: 0
        action:
          policy-result: reject
      - name: overlay_routes
        action:
          policy-result: accept

  - name: evpn_external_in
    default-action:
      policy-result: accept
    statement:
      - name: graceful_shutdown
        match:
          bgp:
            community-set: GRACEFUL_SHUTDOWN
        action:
          bgp:
            local-preference:
              set: 0
      - name: localpref_avoid
        match:
          bgp:
            community-set: AVOIDED_PATH
        action:
          bgp:
            local-preference:
              set: 50
      - name: localpref_backup
        match:
          bgp:
            community-set: BACKUP_PATH
        action:
          bgp:
            local-preference:
              set: 70
      - name: localpref_prefer
        match:
          bgp:
            community-set: SELECTED_PATH
        action:
          bgp:
            local-preference:
              set: 350

  - name: k8s4_in
    default-action:
      policy-result: reject
    statement:
      - name: k8s_prefixes
        match:
          prefix:
            prefix-set: kubernetes-ipv4
        action:
          policy-result: accept

  - name: k8s6_in
    default-action:
      policy-result: reject
    statement:
      - name: k8s_prefixes
        match:
          prefix:
            prefix-set: kubernetes-ipv6
        action:
          policy-result: accept

  - name: k8s_dse4_in
    default-action:
      policy-result: reject
    statement:
      - name: k8s_dse_prefixes
        match:
          prefix:
            prefix-set: k8s_dse-ipv4
        action:
          policy-result: accept

  - name: k8s_dse6_in
    default-action:
      policy-result: reject
    statement:
      - name: k8s_dse_prefixes
        match:
          prefix:
            prefix-set: k8s_dse-ipv6
        action:
          policy-result: accept

  - name: k8s_aux4_in
    default-action:
      policy-result: reject
    statement:
      - name: k8s_aux_prefixes
        match:
          prefix:
            prefix-set: k8s_aux-ipv4
        action:
          policy-result: accept

  - name: k8s_aux6_in
    default-action:
      policy-result: reject
    statement:
      - name: k8s_aux_prefixes
        match:
          prefix:
            prefix-set: k8s_aux-ipv6
        action:
          policy-result: accept

  - name: anycast4_in
    default-action:
      policy-result: reject
    statement:
      - name: anycast_prefixes
        match:
          prefix:
            prefix-set: anycast-ipv4
        action:
          policy-result: accept

  - name: anycast6_in
    default-action:
      policy-result: reject
    statement:
      - name: anycast_prefixes
        match:
          prefix:
            prefix-set: anycast-ipv6
        action:
          policy-result: accept

  - name: ganeti4_in
    default-action:
      policy-result: reject
    statement:
      - name: ganeti_prefixes
        match:
          prefix:
            prefix-set: ganeti-ipv4
        action:
          policy-result: accept

  - name: ganeti6_in
    default-action:
      policy-result: reject
    statement:
      - name: ganeti_prefixes
        match:
          prefix:
            prefix-set: ganeti-ipv6
        action:
          policy-result: accept

  - name: sw_mr4_in
    default-action:
      policy-result: accept

  - name: sw_mr6_in
    default-action:
      policy-result: accept

  - name: sw_mr4_out
    default-action:
      policy-result: reject
    statement:
      - name: default
        match:
          prefix:
            prefix-set: default-ipv4
        action:
          policy-result: accept

  - name: sw_mr6_out
    default-action:
      policy-result: reject
    statement:
      - name: default
        match:
          prefix:
            prefix-set: default-ipv6
        action:
          policy-result: accept

  - name: pybal_in
    default-action:
      policy-result: reject
    statement:
      - name: localpref_avoid
        match:
          bgp:
            community-set: AVOIDED_PATH
        action:
          bgp:
            local-preference:
              set: 50
      - name: localpref_backup
        match:
          bgp:
            community-set: BACKUP_PATH
        action:
          bgp:
            local-preference:
              set: 70
      - name: localpref_prefer
        match:
          bgp:
            community-set: SELECTED_PATH
        action:
          bgp:
            local-preference:
              set: 350
      - name: pybal_prefixes
        match:
          prefix:
            prefix-set: pybal
        action:
          policy-result: accept


